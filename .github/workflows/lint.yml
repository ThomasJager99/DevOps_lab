name: Shell Script Lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run ShellCheck on all .sh files
        run: |
          find . -type f -name "*.sh" -print0 | xargs -0 -r shellcheck -S warning
